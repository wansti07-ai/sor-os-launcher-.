name: Build SoR OS Launcher APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool build-essential ccache python3-pip unzip zip openjdk-17-jdk

      - name: Install Stable Tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install flet
          pip install git+https://github.com/kivy/buildozer.git@master

      - name: Generate Production APK via Buildozer
        run: |
          buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoR_OS_Launcher
          path: bin/*.apk
