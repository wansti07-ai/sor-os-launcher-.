name: Build SoR OS Launcher APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flutter SDK (Required for Flet)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet Tool
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Build Android APK via Official Flet CLI
        run: |
          flet build apk --app-name "SoR OS" --app-version "1.0"

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoR_OS_Launcher
          path: build/apk/*.apk

